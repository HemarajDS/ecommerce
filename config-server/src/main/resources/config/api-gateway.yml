server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

mercora:
  gateway:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/refresh
      - /actuator/health
    rate-limit:
      burst-capacity: 40

spring.security.oauth2.resourceserver.jwt.secret: ${MERCORA_JWT_SECRET:mercora-development-secret-key-mercora-development-secret-key}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
