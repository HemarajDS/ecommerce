server:
  port: 8089

spring:
  application:
    name: cms-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mercora_cms}

mercora:
  cms:
    asset-base-url: ${CMS_ASSET_BASE_URL:https://assets.mercora.local/cms}
    cloudfront-distribution-id: ${CLOUDFRONT_DISTRIBUTION_ID:local-distribution}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
