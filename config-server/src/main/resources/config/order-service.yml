server:
  port: 8085

spring:
  application:
    name: order-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mercora_orders}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mercora:
  order:
    order-placed-topic: order.placed
    order-cancelled-topic: order.cancelled
    order-delivered-topic: order.delivered
    payment-success-topic: payment.success

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
