server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**, /api/v1/catalog/**
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/inventory/**
        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/v1/cart/**, /api/v1/checkout/**
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**, /ws/orders/**
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/v1/payments/**
        - id: dealer-service
          uri: lb://DEALER-SERVICE
          predicates:
            - Path=/api/v1/dealers/**, /api/v1/dealer-pos/**
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
        - id: cms-service
          uri: lb://CMS-SERVICE
          predicates:
            - Path=/api/v1/cms/**

mercora:
  gateway:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/refresh
      - /actuator/health
    rate-limit:
      burst-capacity: 40

spring.security.oauth2.resourceserver.jwt.secret: ${MERCORA_JWT_SECRET:mercora-development-secret-key-mercora-development-secret-key}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
