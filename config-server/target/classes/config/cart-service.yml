server:
  port: 8084

spring:
  application:
    name: cart-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mercora:
  cart:
    cart-ttl-minutes: 30
    coupon-prefix: coupon:
    payment-session-prefix: payment-session:
    checkout-expiry-minutes: 15

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
