server:
  port: 8087

spring:
  application:
    name: dealer-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mercora_dealers}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mercora:
  dealer:
    dealer-created-topic: dealer.created
    po-pending-approval-topic: dealer.po.pending-approval
    payment-term-days: 30
    credit-lock-seconds: 15

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
